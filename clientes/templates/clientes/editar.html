<!DOCTYPE html>
<html>
<head>
    <title>Editar Cliente</title>
</head>
<body>

<h1>Editar Cliente</h1>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="nombre" value="{{ cliente.nombre }}"><br><br>
    <input type="text" name="dpi" value="{{ cliente.dpi }}"><br><br>
    <input type="text" name="telefono" value="{{ cliente.telefono }}"><br><br>
    <input type="email" name="correo" value="{{ cliente.correo }}"><br><br>
    <input type="text" name="direccion" value="{{ cliente.direccion }}"><br><br>
    <input type="text" name="tipo_cliente" value="{{ cliente.tipo_cliente }}"><br><br>
    <input type="text" name="estado" value="{{ cliente.estado }}"><br><br>
    <textarea name="observaciones">{{ cliente.observaciones }}</textarea><br><br>

    <button type="submit">Guardar cambios</button>
</form>

</body>
</html>
