<!DOCTYPE html>
<html>
<head>
    <title>Editar Expediente</title>
</head>
<body>

<h2>Editar Expediente</h2>

<form method="POST">
    {% csrf_token %}

    <label>Número:</label><br>
    <input type="text" name="numero" value="{{ expediente.numero }}"><br><br>

    <label>Tipo de caso:</label><br>
    <input type="text" name="tipo_caso" value="{{ expediente.tipo_caso }}"><br><br>

    <label>Estado:</label><br>
    <input type="text" name="estado" value="{{ expediente.estado }}"><br><br>

    <label>Gaveta:</label><br>
    <input type="text" name="gaveta" value="{{ expediente.gaveta }}"><br><br>

    <label>Archivo:</label><br>
    <input type="text" name="archivo" value="{{ expediente.archivo }}"><br><br>

    <button type="submit">Guardar cambios</button>

</form>

<br>
<a href="/clientes/panel/?seccion=expedientes">← Volver</a>

</body>
</html>
