<!DOCTYPE html>
<html>
<head>
    <title>Editar Cliente</title>
</head>
<body>

<h2>Editar Cliente</h2>

<form method="POST">
    {% csrf_token %}

    <input name="nombre" value="{{ cliente.nombre }}"><br><br>
    <input name="telefono" value="{{ cliente.telefono }}"><br><br>
    <input name="dpi" value="{{ cliente.dpi }}"><br><br>
    <input name="correo" value="{{ cliente.correo }}"><br><br>
    <input name="direccion" value="{{ cliente.direccion }}"><br><br>

    <button type="submit">Guardar cambios</button>

</form>

</body>
</html>
