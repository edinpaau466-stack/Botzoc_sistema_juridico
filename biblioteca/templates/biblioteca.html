{% extends 'base.html' %}

{% block content %}

<div style="max-width:1100px; margin:40px auto;">

    <div style="
        background:white;
        padding:30px;
        border-radius:15px;
        box-shadow:0px 10px 25px rgba(0,0,0,0.1);
    ">

        <h2 style="margin-bottom:25px; font-size:24px;">
            📂 Biblioteca Jurídica - Penal
        </h2>

        {% for ley in leyes %}
        <div style="
            border:1px solid #e5e7eb;
            border-radius:12px;
            padding:20px;
            margin-bottom:15px;
            transition:0.3s;
        "
        onmouseover="this.style.transform='translateY(-5px)'; this.style.boxShadow='0px 10px 20px rgba(0,0,0,0.15)'"
        onmouseout="this.style.transform='none'; this.style.boxShadow='none'"
        >

            <h3 style="margin:0;">{{ ley.titulo }}</h3>

            <p style="color:#6b7280; margin-top:5px;">
                📁 {{ ley.categoria }}
            </p>

            <a href="{{ ley.archivo.url }}" target="_blank"
               style="
               display:inline-block;
               margin-top:10px;
               background:#22c55e;
               color:white;
               padding:10px 18px;
               border-radius:8px;
               text-decoration:none;
               ">
               📄 Ver PDF
            </a>

        </div>
        {% endfor %}

    </div>

</div>

{% endblock %}
