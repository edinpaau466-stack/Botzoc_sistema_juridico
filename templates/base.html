<!DOCTYPE html>
<html>
<head>
    <title>Bufete Botzoc</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #4c1d95, #7c3aed);
        }

        .container {
            display: flex;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            height: 100vh;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 20px;
            color: white;
        }

        .sidebar h2 {
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: #e5e7eb;
            text-decoration: none;
            margin: 15px 0;
        }

        .sidebar a:hover {
            color: white;
        }

        /* CONTENIDO PRINCIPAL */
        .main {
            flex: 1;
            padding: 40px;
            background: white;
            color: black;
            border-top-left-radius: 30px;
            border-bottom-left-radius: 30px;
            box-shadow: -10px 0px 30px rgba(0,0,0,0.2);
        }

        .header {
            margin-bottom: 30px;
        }

        /* TARJETAS */
        .card {
            background: #f1f5f9;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        button {
            background: #7c3aed;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
        }

        input {
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            margin-bottom: 20px;
            width: 300px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>⚖️ Bufete</h2>

        <a href="/">🏠 Dashboard</a>
        <a href="/">👤 Clientes</a>
        <a href="/audiencias/">📅 Audiencias</a>
        <a href="/recordatorios/">⏰ Recordatorios</a>
    </div>

    <!-- CONTENIDO -->
    <div class="main">

        <div class="header">
            <h1>Bienvenido Edin 👨‍⚖️</h1>
        </div>

        {% block content %}{% endblock %}

    </div>

</div>

</body>
</html>
