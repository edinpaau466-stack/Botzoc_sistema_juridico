k{% extends 'base.html' %}

{% block content %}

<h1>⏰ Recordatorios</h1>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="descripcion" placeholder="Descripción">
    <input type="date" name="fecha">

    <br><br>

    <button style="background:#22c55e; padding:10px; border:none; border-radius:8px; color:white;">
        + Agregar Recordatorio
    </button>
</form>

<br><br>

{% for recordatorio in recordatorios %}
<div style="background:#1e293b; padding:15px; margin-bottom:10px; border-radius:10px; color:white;">

    {{ recordatorio.descripcion }} - {{ recordatorio.fecha }}

    <a href="/eliminar_recordatorio/{{ recordatorio.id }}/"
       onclick="return confirm('¿Eliminar este recordatorio?')">

        <button 
        style="background:#ef4444; float:right; color:white; border:none; padding:6px 12px; border-radius:8px; font-size:13px; cursor:pointer;"
        onmouseover="this.style.background='#dc2626'"
        onmouseout="this.style.background='#ef4444'">
            🗑 Eliminar
        </button>

    </a>

</div>
{% endfor %}

{% endblock %}
