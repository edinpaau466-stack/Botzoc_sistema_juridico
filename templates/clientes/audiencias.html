<h2>Audiencias ⚖️</h2>

<form method="GET">
    <input type="text" name="buscar" placeholder="🔍 Buscar cliente">
    <button type="submit">Buscar</button>
</form>

<hr>

<form method="POST">
    {% csrf_token %}

    <select name="cliente">
        {% for c in clientes %}
        <option value="{{ c.id }}">{{ c.nombre }}</option>
        {% endfor %}
    </select>

    <input type="text" name="tipo" placeholder="Tipo de audiencia">
    <input type="text" name="proceso" placeholder="Proceso">
    <input type="text" name="juzgado" placeholder="Juzgado">
    <input type="date" name="fecha">
    <input type="time" name="hora">
    <input type="text" name="descripcion" placeholder="Descripción">

    <button type="submit">Guardar Audiencia</button>
</form>

<hr>

<h3>Lista de Audiencias</h3>

{% for a in audiencias %}
<div style="border:1px solid black; margin:10px; padding:10px;">
    
    <b>{{ a.cliente.nombre }}</b><br>
    Tipo: {{ a.tipo }}<br>
    Proceso: {{ a.proceso }}<br>
    Juzgado: {{ a.juzgado }}<br>
    Fecha: {{ a.fecha }}<br>
    Hora: {{ a.hora }}<br>

    <a href="{% url 'editar_audiencia' a.id %}">✏️ Editar</a>

    <a href="/eliminar_audiencia/{{ a.id }}" 
    onclick="return confirm('¿Seguro que deseas eliminar esta audiencia?')">
    ❌ Eliminar
    </a>

</div>
{% empty %}
<p>No hay audiencias</p>
{% endfor %}

<a href="/">Volver</a>
