{% extends 'base.html' %}

{% block content %}

<h1>👤 Clientes</h1>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="nombre" placeholder="Nombre" required>
    <input type="text" name="telefono" placeholder="Teléfono">
    <input type="email" name="correo" placeholder="Correo">
    <input type="text" name="proceso" placeholder="Proceso">

    <br><br>

    <button style="background:#22c55e; padding:10px; border:none; border-radius:8px; color:white; cursor:pointer;">
        + Agregar Cliente
    </button>
</form>

<br><br>

{% for cliente in clientes %}
<div style="background:#1e293b; padding:15px; margin-bottom:10px; border-radius:10px; color:white;">

    {{ cliente.nombre }}

    <a href="/eliminar/{{ cliente.id }}/"
       onclick="return confirm('¿Seguro que deseas eliminar este cliente?')">

        <button 
        style="background:#ef4444; float:right; color:white; border:none; padding:6px 12px; border-radius:8px; font-size:13px; cursor:pointer;"
        onmouseover="this.style.background='#dc2626'"
        onmouseout="this.style.background='#ef4444'">
            🗑 Eliminar
        </button>

    </a>

</div>
{% endfor %}

{% endblock %}
