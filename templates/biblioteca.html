<!DOCTYPE html>
<html>
<head>
    <title>Biblioteca Jurídica</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
        }

        header {
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 22px;
            font-weight: bold;
        }

        .container {
            max-width: 1200px;
            width: 90%;
            margin: 40px auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
        }

        .titulo {
            font-size: 26px;
            margin-bottom: 30px;
            color: #1e293b;
        }

        .card {
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
            background: #ffffff;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .card h3 {
            margin: 0;
            color: #0f172a;
        }

        .categoria {
            color: #64748b;
            font-size: 14px;
            margin: 10px 0;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            padding: 10px 20px;
            border-radius: 10px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: linear-gradient(135deg, #16a34a, #15803d);
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<header>
    ⚖️ Sistema Jurídico - Edin Botzoc
</header>

<div class="container">

    <div class="titulo">📚 Biblioteca Jurídica</div>

    {% for ley in leyes %}
    <div class="card">
        <h3>{{ ley.titulo }}</h3>
        <p class="categoria">📁 {{ ley.categoria }}</p>

        <a href="{{ ley.archivo.url }}" target="_blank" class="btn">
            📄 Ver PDF
        </a>
    </div>
    {% endfor %}

</div>

</body>
</html>
